services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://comicvault:comicvault@postgres:5432/comicvault
      - JWT_SECRET=${JWT_SECRET:-supersecretchangeme}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=10080
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:14-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: comicvault
      POSTGRES_PASSWORD: comicvault
      POSTGRES_DB: comicvault
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comicvault"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

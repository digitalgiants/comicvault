networks:
  comicvault:
    driver: bridge

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    restart: unless-stopped
    networks:
      - comicvault
    volumes:
      - ./frontend/src:/app/src:z
    environment:
      - VITE_API_URL=/api
      - VITE_PROXY_TARGET=http://backend:8000
      - VITE_ALLOWED_HOST=cv.digitalgiants.net
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - comicvault
    volumes:
      - ./backend:/app:z
    environment:
      - DATABASE_URL=postgresql://comicvault:comicvault@postgres:5432/comicvault
      - JWT_SECRET=${JWT_SECRET:-supersecretchangeme}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=10080
      - WATCHFILES_FORCE_POLLING=true
      - CORS_ORIGINS=https://cv.digitalgiants.net,http://localhost:3002
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "until pg_isready -h postgres -U comicvault; do sleep 1; done
      && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  postgres:
    image: postgres:14-alpine
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - comicvault
    environment:
      POSTGRES_USER: comicvault
      POSTGRES_PASSWORD: comicvault
      POSTGRES_DB: comicvault
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comicvault"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
